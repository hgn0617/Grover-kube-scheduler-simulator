# 路径图P5测试场景：5个Pod，4条边
# 线性连接：北京-天津-济南-南京-上海
# 理论色数：2色（二分图）

# 5个节点
apiVersion: v1
kind: Node
metadata:
  name: node-1
status:
  capacity:
    cpu: "8"
    memory: 16Gi
    pods: "110"
  allocatable:
