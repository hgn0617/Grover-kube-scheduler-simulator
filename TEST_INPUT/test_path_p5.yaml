---
# Pod 0: 北京 (连接天津)
apiVersion: v1
kind: Pod
metadata:
  name: beijing
  labels:
    app: beijing
    quantum-batch: "path-p5"
  annotations:
    quantum-scheduler.io/batch-size: "5"
spec:
  schedulingGates:
  - name: "quantum-scheduler.io/computing"
  containers:
  - name: app
    image: nginx
    resources:
      requests:
        cpu: "1"
        memory: 1Gi
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
          - key: app
            operator: In
            values: ["tianjin"]
        topologyKey: kubernetes.io/hostname
---
# Pod 1: 天津 (连接北京, 济南)
apiVersion: v1
kind: Pod
metadata:
  name: tianjin
  labels:
    app: tianjin
    quantum-batch: "path-p5"
  annotations:
    quantum-scheduler.io/batch-size: "5"
spec:
  schedulingGates:
  - name: "quantum-scheduler.io/computing"
  containers:
  - name: app
    image: nginx
    resources:
      requests:
        cpu: "1"
        memory: 1Gi
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
          - key: app
            operator: In
            values: ["beijing", "jinan"]
        topologyKey: kubernetes.io/hostname
---
