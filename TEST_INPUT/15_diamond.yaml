---
# Pod 0: 顶部 (连接: 左侧, 右侧)
apiVersion: v1
kind: Pod
metadata:
  name: pod-0
  labels:
    app: app-0
    quantum-batch: "15_diamond"
  annotations:
    quantum-scheduler.io/batch-size: "4"
spec:
  schedulingGates:
  - name: "quantum-scheduler.io/computing"
  containers:
  - name: app
    image: nginx
    resources:
      requests:
        cpu: "1"
        memory: 1Gi
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
          - key: app
            operator: In
            values: ["app-1", "app-2"]
        topologyKey: kubernetes.io/hostname
---
# Pod 1: 左侧 (连接: 顶部, 底部, 右侧)
apiVersion: v1
kind: Pod
metadata:
  name: pod-1
  labels:
    app: app-1
    quantum-batch: "15_diamond"
  annotations:
    quantum-scheduler.io/batch-size: "4"
spec:
  schedulingGates:
  - name: "quantum-scheduler.io/computing"
  containers:
  - name: app
    image: nginx
    resources:
      requests:
        cpu: "1"
        memory: 1Gi
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
          - key: app
            operator: In
            values: ["app-0", "app-3", "app-2"]
        topologyKey: kubernetes.io/hostname
---
# Pod 2: 右侧 (连接: 顶部, 底部, 左侧)
