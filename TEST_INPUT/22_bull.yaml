metadata:
  name: node-1
  labels:
    kubernetes.io/hostname: node-1
    node-role.kubernetes.io/worker: ""
status:
  capacity:
    cpu: "8"
    memory: 16Gi
    pods: "110"
  allocatable:
    cpu: "8"
    memory: 16Gi
    pods: "110"
