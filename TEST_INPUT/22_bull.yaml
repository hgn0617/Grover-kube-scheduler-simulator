---
# Pod 0: Head (连接: Body-L, Body-R)
apiVersion: v1
kind: Pod
metadata:
  name: pod-0
  labels:
    app: app-0
    quantum-batch: "22_bull"
  annotations:
    quantum-scheduler.io/batch-size: "5"
spec:
  schedulingGates:
  - name: "quantum-scheduler.io/computing"
  containers:
  - name: app
    image: nginx
    resources:
      requests:
        cpu: "1"
        memory: 1Gi
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
          - key: app
            operator: In
            values: ["app-1", "app-2"]
        topologyKey: kubernetes.io/hostname
---
# Pod 1: Body-L (连接: Head, Body-R, Leg-L)
