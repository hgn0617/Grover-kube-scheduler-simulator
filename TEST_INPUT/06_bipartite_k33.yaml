# Pod 0: 北方A (连接: 南方1, 南方2, 南方3)
apiVersion: v1
kind: Pod
metadata:
  name: pod-0
  labels:
    app: app-0
    quantum-batch: "06_bipartite_k33"
  annotations:
    quantum-scheduler.io/batch-size: "6"
spec:
  schedulingGates:
  - name: "quantum-scheduler.io/computing"
  containers:
  - name: app
    image: nginx
    resources:
      requests:
        cpu: "1"
        memory: 1Gi
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
          - key: app
            operator: In
            values: ["app-3", "app-4", "app-5"]
        topologyKey: kubernetes.io/hostname
