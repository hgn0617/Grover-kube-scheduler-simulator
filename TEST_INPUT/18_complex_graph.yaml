# Pod 0: 中心枢纽 (连接: 东区, 南区, 西区)
apiVersion: v1
kind: Pod
metadata:
  name: pod-0
  labels:
    app: app-0
    quantum-batch: "18_complex_graph"
  annotations:
    quantum-scheduler.io/batch-size: "7"
spec:
  schedulingGates:
  - name: "quantum-scheduler.io/computing"
  containers:
  - name: app
    image: nginx
    resources:
      requests:
        cpu: "1"
        memory: 1Gi
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
          - key: app
            operator: In
            values: ["app-1", "app-2", "app-3"]
        topologyKey: kubernetes.io/hostname
---
