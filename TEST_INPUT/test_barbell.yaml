# 哑铃图测试场景：6个Pod，7条冲突边
# 西部三角形(0,1,2) + 桥(2-3) + 东部三角形(3,4,5)
# 理论色数：3色

# 5个节点
apiVersion: v1
kind: Node
metadata:
  name: node-1
status:
  capacity:
    cpu: "8"
    memory: 16Gi
    pods: "110"
  allocatable:
    cpu: "8"
    memory: 16Gi
    pods: "110"
---
apiVersion: v1
kind: Node
metadata:
  name: node-2
status:
  capacity:
    cpu: "8"
    memory: 16Gi
