    memory: 16Gi
    pods: "110"
---
# Pod 0: 西A (连接西B, 西C)
apiVersion: v1
kind: Pod
metadata:
  name: west-a
  labels:
    app: west-a
    quantum-batch: "barbell"
  annotations:
    quantum-scheduler.io/batch-size: "6"
spec:
  schedulingGates:
  - name: "quantum-scheduler.io/computing"
  containers:
  - name: app
    image: nginx
    resources:
      requests:
        cpu: "1"
        memory: 1Gi
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
          - key: app
            operator: In
            values: ["west-b", "west-c"]
        topologyKey: kubernetes.io/hostname
---
# Pod 1: 西B (连接西A, 西C)
apiVersion: v1
kind: Pod
metadata:
  name: west-b
  labels:
    app: west-b
    quantum-batch: "barbell"
  annotations:
    quantum-scheduler.io/batch-size: "6"
spec:
  schedulingGates:
  - name: "quantum-scheduler.io/computing"
  containers:
  - name: app
    image: nginx
    resources:
      requests:
        cpu: "1"
        memory: 1Gi
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
          - key: app
            operator: In
            values: ["west-a", "west-c"]
        topologyKey: kubernetes.io/hostname
---
# Pod 2: 西C (连接西A, 西B, 东A) - 桥节点
apiVersion: v1
kind: Pod
metadata:
