    cpu: "8"
    memory: 16Gi
    pods: "110"
---
# Pod 0: 区域1 (连接: 区域2, 区域3, 区域4)
apiVersion: v1
kind: Pod
metadata:
  name: pod-0
  labels:
    app: app-0
    quantum-batch: "10_map_coloring"
  annotations:
    quantum-scheduler.io/batch-size: "5"
spec:
  schedulingGates:
  - name: "quantum-scheduler.io/computing"
  containers:
  - name: app
    image: nginx
    resources:
      requests:
        cpu: "1"
        memory: 1Gi
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
          - key: app
            operator: In
            values: ["app-1", "app-2", "app-3"]
        topologyKey: kubernetes.io/hostname
---
# Pod 1: 区域2 (连接: 区域1, 区域3, 区域4, 区域5)
apiVersion: v1
kind: Pod
metadata:
  name: pod-1
  labels:
    app: app-1
    quantum-batch: "10_map_coloring"
  annotations:
    quantum-scheduler.io/batch-size: "5"
spec:
  schedulingGates:
  - name: "quantum-scheduler.io/computing"
  containers:
  - name: app
    image: nginx
    resources:
      requests:
        cpu: "1"
        memory: 1Gi
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
          - key: app
            operator: In
            values: ["app-0", "app-2", "app-3", "app-4"]
        topologyKey: kubernetes.io/hostname
---
# Pod 2: 区域3 (连接: 区域1, 区域2, 区域4)
apiVersion: v1
kind: Pod
