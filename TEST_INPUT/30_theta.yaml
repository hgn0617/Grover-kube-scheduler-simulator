# Theta Graph: Path with triangle in middle
# 5个Pod，5条冲突边

---
apiVersion: v1
kind: Node
metadata:
  name: node-1
  labels:
    kubernetes.io/hostname: node-1
    node-role.kubernetes.io/worker: ""
status:
  capacity:
    cpu: "8"
    memory: 16Gi
    pods: "110"
  allocatable:
    cpu: "8"
    memory: 16Gi
    pods: "110"
---
apiVersion: v1
kind: Node
metadata:
  name: node-2
  labels:
    kubernetes.io/hostname: node-2
    node-role.kubernetes.io/worker: ""
status:
  capacity:
    cpu: "8"
    memory: 16Gi
    pods: "110"
  allocatable:
    cpu: "8"
    memory: 16Gi
