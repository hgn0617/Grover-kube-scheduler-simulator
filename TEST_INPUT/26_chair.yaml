---
# Pod 0: Leg-L (连接: Seat-L, Back-L)
apiVersion: v1
kind: Pod
metadata:
  name: pod-0
  labels:
    app: app-0
    quantum-batch: "26_chair"
  annotations:
    quantum-scheduler.io/batch-size: "6"
spec:
  schedulingGates:
  - name: "quantum-scheduler.io/computing"
  containers:
  - name: app
    image: nginx
    resources:
      requests:
        cpu: "1"
        memory: 1Gi
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
          - key: app
            operator: In
            values: ["app-1", "app-4"]
        topologyKey: kubernetes.io/hostname
---
