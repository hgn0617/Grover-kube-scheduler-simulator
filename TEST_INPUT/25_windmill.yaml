---
# Pod 0: Center (连接: Blade1-A, Blade1-B, Blade2-A, Blade2-B, Blade3-A, Blade3-B)
apiVersion: v1
kind: Pod
metadata:
  name: pod-0
  labels:
    app: app-0
    quantum-batch: "25_windmill"
  annotations:
    quantum-scheduler.io/batch-size: "7"
spec:
  schedulingGates:
  - name: "quantum-scheduler.io/computing"
  containers:
  - name: app
    image: nginx
    resources:
      requests:
        cpu: "1"
        memory: 1Gi
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
          - key: app
            operator: In
            values: ["app-1", "app-2", "app-3", "app-4", "app-5", "app-6"]
        topologyKey: kubernetes.io/hostname
---
