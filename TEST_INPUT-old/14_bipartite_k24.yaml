---
# Pod 0: 左A (连接: 右A, 右B, 右C, 右D)
apiVersion: v1
kind: Pod
metadata:
  name: pod-0
  labels:
    app: app-0
    quantum-batch: "14_bipartite_k24"
  annotations:
    quantum-scheduler.io/batch-size: "6"
spec:
  schedulingGates:
  - name: "quantum-scheduler.io/computing"
  containers:
  - name: app
    image: nginx
    resources:
      requests:
        cpu: "1"
        memory: 1Gi
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
          - key: app
            operator: In
            values: ["app-2", "app-3", "app-4", "app-5"]
        topologyKey: kubernetes.io/hostname
---
