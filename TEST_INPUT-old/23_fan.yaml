---
# Pod 0: Path-0 (连接: Path-1, Hub)
apiVersion: v1
kind: Pod
metadata:
  name: pod-0
  labels:
    app: app-0
    quantum-batch: "23_fan"
  annotations:
    quantum-scheduler.io/batch-size: "6"
spec:
  schedulingGates:
  - name: "quantum-scheduler.io/computing"
  containers:
  - name: app
    image: nginx
    resources:
      requests:
        cpu: "1"
        memory: 1Gi
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
          - key: app
            operator: In
            values: ["app-1", "app-5"]
        topologyKey: kubernetes.io/hostname
---
# Pod 1: Path-1 (连接: Path-0, Path-2, Hub)
