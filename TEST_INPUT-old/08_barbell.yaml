# 哑铃图：两个完全子图连接，需3种颜色
# 6个Pod，7条冲突边

---
apiVersion: v1
kind: Node
metadata:
  name: node-1
  labels:
    kubernetes.io/hostname: node-1
    node-role.kubernetes.io/worker: ""
status:
  capacity:
    cpu: "8"
    memory: 16Gi
    pods: "110"
  allocatable:
    cpu: "8"
    memory: 16Gi
    pods: "110"
