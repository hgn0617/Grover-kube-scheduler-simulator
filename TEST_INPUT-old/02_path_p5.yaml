    pods: "110"
---
# Pod 0: 北京 (连接: 天津)
apiVersion: v1
kind: Pod
metadata:
  name: pod-0
  labels:
    app: app-0
    quantum-batch: "02_path_p5"
  annotations:
    quantum-scheduler.io/batch-size: "5"
spec:
  schedulingGates:
  - name: "quantum-scheduler.io/computing"
  containers:
  - name: app
    image: nginx
    resources:
      requests:
        cpu: "1"
        memory: 1Gi
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
          - key: app
            operator: In
            values: ["app-1"]
        topologyKey: kubernetes.io/hostname
---
# Pod 1: 天津 (连接: 北京, 济南)
apiVersion: v1
kind: Pod
metadata:
  name: pod-1
  labels:
    app: app-1
    quantum-batch: "02_path_p5"
  annotations:
    quantum-scheduler.io/batch-size: "5"
spec:
  schedulingGates:
  - name: "quantum-scheduler.io/computing"
  containers:
  - name: app
    image: nginx
    resources:
      requests:
        cpu: "1"
        memory: 1Gi
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
          - key: app
            operator: In
            values: ["app-0", "app-2"]
        topologyKey: kubernetes.io/hostname
---
