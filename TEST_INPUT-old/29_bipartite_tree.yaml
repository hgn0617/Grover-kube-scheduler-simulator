---
# Pod 0: Root (连接: L1-A, L1-B)
apiVersion: v1
kind: Pod
metadata:
  name: pod-0
  labels:
    app: app-0
    quantum-batch: "29_bipartite_tree"
  annotations:
    quantum-scheduler.io/batch-size: "7"
spec:
  schedulingGates:
  - name: "quantum-scheduler.io/computing"
  containers:
  - name: app
    image: nginx
    resources:
      requests:
        cpu: "1"
        memory: 1Gi
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
          - key: app
            operator: In
            values: ["app-1", "app-2"]
        topologyKey: kubernetes.io/hostname
---
