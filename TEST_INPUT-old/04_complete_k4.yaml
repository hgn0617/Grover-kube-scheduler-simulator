    cpu: "8"
    memory: 16Gi
    pods: "110"
---
# Pod 0: 北京 (连接: 上海, 广州, 深圳)
apiVersion: v1
kind: Pod
metadata:
  name: pod-0
  labels:
    app: app-0
    quantum-batch: "04_complete_k4"
  annotations:
    quantum-scheduler.io/batch-size: "4"
spec:
  schedulingGates:
  - name: "quantum-scheduler.io/computing"
  containers:
  - name: app
    image: nginx
    resources:
      requests:
        cpu: "1"
        memory: 1Gi
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
          - key: app
            operator: In
            values: ["app-1", "app-2", "app-3"]
        topologyKey: kubernetes.io/hostname
---
