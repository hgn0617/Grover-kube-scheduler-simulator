# Local helper compose file: bring up quantum-service together with simulator.
services:
  quantum-service:
    build:
      context: ./simulator/scheduler/quantum_scheduler_service
      dockerfile: Dockerfile
    container_name: quantum-service
    ports:
      - "8000:8000"
    restart: always
    networks:
      - simulator-internal-network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

