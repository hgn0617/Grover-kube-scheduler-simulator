apiVersion: kubescheduler.config.k8s.io/v1
kind: KubeSchedulerConfiguration
leaderElection:
  leaderElect: false
clientConnection:
  kubeconfig: "/config/kubeconfig.yaml"
profiles:
  - schedulerName: default-scheduler
    plugins:
      score:
        disabled:
          - name: "*"
        enabled:
          - name: QuantumScheduler
            weight: 1000
